{% extends "_base.html" %}

{% block title %}Criar Nova Lista{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto mt-12">
    <div class="bg-gray-800 p-8 rounded-xl shadow-2xl border border-gray-700">
        <h2 class="text-3xl font-bold text-white mb-6 flex items-center gap-3">
            <span class="bg-purple-600 p-2 rounded-lg">
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"></path></svg>
            </span>
            Criar Nova Lista
        </h2>
        
        <form method="post" action="{{ url_for('create_list') }}" class="space-y-6">
            <div>
                <label for="title" class="block text-sm font-medium text-gray-300 mb-2">Nome da Lista</label>
                <input id="title" name="title" type="text" required placeholder="ex: Melhores de 2024, Clássicos do Rock..." 
                       class="w-full p-4 rounded-lg bg-gray-900 border border-gray-600 text-white focus:outline-none focus:border-purple-500 focus:ring-1 focus:ring-purple-500 transition-all" />
            </div>

            <div>
                <label for="description" class="block text-sm font-medium text-gray-300 mb-2">Descrição (opcional)</label>
                <textarea id="description" name="description" rows="4" placeholder="Sobre o que é essa lista?" 
                          class="w-full p-4 rounded-lg bg-gray-900 border border-gray-600 text-white focus:outline-none focus:border-purple-500 focus:ring-1 focus:ring-purple-500 transition-all resize-none"></textarea>
            </div>

            <div class="flex justify-end gap-4 pt-4">
                <a href="{{ url_for('lists_index') }}" class="px-6 py-3 rounded-lg text-gray-400 hover:text-white hover:bg-gray-700 transition-colors">Cancelar</a>
                <button type="submit" class="px-8 py-3 bg-purple-600 hover:bg-purple-700 text-white font-bold rounded-lg transition-all shadow-lg hover:shadow-purple-500/30">
                    Criar Lista
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
